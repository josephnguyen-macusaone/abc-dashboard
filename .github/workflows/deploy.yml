# Repo secrets: Settings → Secrets and variables → Actions
name: Build and Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Gate: lint + tests must pass before anything is built or deployed ──────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: abc_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend lint
        working-directory: backend
        run: npm run lint

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/abc_test
          JWT_SECRET: test-secret-key-for-ci-at-least-32-chars
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          JWT_ISSUER: abc-dashboard-test
          REDIS_ENABLED: false
          CACHE_TYPE: memory
        run: npm test

  # ── Build + Deploy (only after tests pass) ─────────────────────────────────
  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Create .env file for build
        run: |
          cat > .env << EOF
          # Environment
          NODE_ENV=production

          # Database Configuration
          POSTGRES_DB=${{ secrets['POSTGRES_DB'] }}
          POSTGRES_USER=${{ secrets['POSTGRES_USER'] }}
          POSTGRES_PASSWORD=${{ secrets['POSTGRES_PASSWORD'] }}
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql://${{ secrets['POSTGRES_USER'] }}:${{ secrets['POSTGRES_PASSWORD'] }}@postgres:5432/${{ secrets['POSTGRES_DB'] }}

          # JWT Configuration
          JWT_SECRET=${{ secrets['JWT_SECRET'] }}
          JWT_EXPIRES_IN=24h
          JWT_REFRESH_EXPIRES_IN=7d
          JWT_ISSUER=abc-dashboard
          JWT_EMAIL_VERIFICATION_EXPIRES_IN=24h
          JWT_PASSWORD_RESET_EXPIRES_IN=10m

          # Email Configuration (Mailjet Production)
          EMAIL_SERVICE=${{ secrets['EMAIL_SERVICE'] }}
          EMAIL_HOST=${{ secrets['EMAIL_HOST'] }}
          EMAIL_PORT=${{ secrets['EMAIL_PORT'] }}
          EMAIL_SECURE=false
          EMAIL_FROM=${{ secrets['EMAIL_FROM'] }}
          EMAIL_FROM_NAME=${{ secrets['EMAIL_FROM_NAME'] }}
          EMAIL_USER=${{ secrets['EMAIL_USER'] }}
          EMAIL_PASS=${{ secrets['EMAIL_PASS'] }}

          # External License API
          EXTERNAL_LICENSE_API_URL=${{ secrets['EXTERNAL_LICENSE_API_URL'] }}
          EXTERNAL_LICENSE_API_KEY=${{ secrets['EXTERNAL_LICENSE_API_KEY'] }}

          # Client Configuration
          CLIENT_URL=${{ secrets['CLIENT_URL'] }}

          # Frontend Configuration (CRITICAL: baked into build)
          # Production uses relative API paths (/api/v1)
          # OpenLiteSpeed proxies https://portal.abcsalon.us/api/v1/* to backend:5000
          NEXT_PUBLIC_USE_RELATIVE_API=true
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets['NEXT_SERVER_ACTIONS_ENCRYPTION_KEY'] }}

          # Security
          BCRYPT_ROUNDS=12
          ENCRYPTION_KEY=${{ secrets['ENCRYPTION_KEY'] }}

          # Cache Configuration
          CACHE_USER_DATA_TTL=1800
          CACHE_API_RESPONSE_TTL=300

          # Redis
          REDIS_URL=redis://redis:6379
          REDIS_ENABLED=true
          CACHE_TYPE=redis

          # Scheduled Jobs
          SCHEDULED_JOBS_ENABLED=true
          LICENSE_STATUS_JOB_RUN_ON_STARTUP=true
          LICENSE_SYNC_SCHEDULE=0 2,3 * * *
          LICENSE_SYNC_ENABLED=false
          EOF

      - name: Build Docker images
        run: |
          echo "=========================================="
          echo "Building for branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"
          echo "=========================================="

          echo "Building backend..."
          docker compose build backend

          echo "Building frontend..."
          docker compose build frontend

          echo "Build complete"
          docker images | grep abc-license

      - name: Save images to compressed archives
        run: |
          mkdir -p dist

          echo "Saving backend image..."
          docker save abc-license-backend:latest | gzip > dist/backend.tar.gz

          echo "Saving frontend image..."
          docker save abc-license-frontend:latest | gzip > dist/frontend.tar.gz

          echo "Images saved"
          ls -lh dist/

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets['SERVER_SSH_KEY'] }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets['SERVER_HOST'] }} >> ~/.ssh/known_hosts

      - name: Transfer images to server
        run: |
          echo "Transferring images to server..."
          scp -i ~/.ssh/deploy_key dist/backend.tar.gz dist/frontend.tar.gz \
            ${{ secrets['SERVER_USER'] }}@${{ secrets['SERVER_HOST'] }}:/root/abc-dashboard/dist/
          echo "Transfer complete"

      - name: Deploy on server
        env:
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          echo "Deploying on server..."
          ssh -i ~/.ssh/deploy_key ${{ secrets['SERVER_USER'] }}@${{ secrets['SERVER_HOST'] }} << ENDSSH
            set -e
            cd /root/abc-dashboard

            echo "=========================================="
            echo "Deployment: $BRANCH @ $COMMIT_MSG"
            echo "Author: $COMMIT_AUTHOR  Time: \$(date)"
            echo "=========================================="

            # Tag currently-running images as :rollback before swapping
            echo "Tagging current images as :rollback..."
            docker tag abc-license-backend:latest abc-license-backend:rollback 2>/dev/null || true
            docker tag abc-license-frontend:latest abc-license-frontend:rollback 2>/dev/null || true

            echo "Loading new images..."
            docker load < dist/backend.tar.gz
            docker load < dist/frontend.tar.gz

            echo "Verifying images..."
            docker images | grep abc-license | head -6

            echo "Ensuring LICENSE_SYNC_ENABLED=false..."
            if grep -q '^LICENSE_SYNC_ENABLED=' .env 2>/dev/null; then
              sed -i.bak 's/^LICENSE_SYNC_ENABLED=.*/LICENSE_SYNC_ENABLED=false/' .env
            else
              echo "LICENSE_SYNC_ENABLED=false" >> .env
            fi

            echo "Running database migrations..."
            docker compose run --rm backend node -e "
              import('./src/infrastructure/config/database.js').then(({ default: db }) =>
                db.migrate.latest().then(() => { console.log('Migrations done'); process.exit(0); })
              ).catch(e => { console.error(e); process.exit(1); });
            "

            echo "Starting services..."
            docker compose up -d

            echo "Waiting for services to stabilize..."
            sleep 15

            echo "Container status:"
            docker compose ps

            echo "Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          ssh -i ~/.ssh/deploy_key ${{ secrets['SERVER_USER'] }}@${{ secrets['SERVER_HOST'] }} << 'ENDSSH'
            cd /root/abc-dashboard

            # Wait up to 60 s for backend health
            timeout=60
            echo "Checking backend health..."
            while [ $timeout -gt 0 ]; do
              if docker compose exec -T backend curl -sf http://localhost:5000/api/v1/health >/dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi
              sleep 2
              timeout=$((timeout - 2))
            done

            if [ $timeout -le 0 ]; then
              echo "Backend health check timed out — rolling back..."
              docker tag abc-license-backend:rollback abc-license-backend:latest
              docker tag abc-license-frontend:rollback abc-license-frontend:latest
              docker compose up -d
              echo "Rollback triggered. Exiting with error."
              exit 1
            fi

            # Check frontend
            echo "Checking frontend..."
            if docker compose exec -T frontend wget --quiet --tries=1 --spider http://localhost:3000/ 2>&1; then
              echo "Frontend is healthy"
            else
              echo "Frontend may still be starting"
              docker compose logs frontend --tail 50
            fi

            echo "Container status:"
            docker compose ps
          ENDSSH

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf dist/

      - name: Deployment summary
        if: success()
        run: |
          echo "================================================================================"
          echo "DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "================================================================================"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ github.event.head_commit.message }}"
          echo "Author:  ${{ github.event.head_commit.author.name }}"
          echo "Time:    $(date)"
          echo ""
          echo "URLs:"
          echo "  Frontend: http://${{ secrets['SERVER_HOST'] }}:3000"
          echo "  API:      http://${{ secrets['SERVER_HOST'] }}:5000/api/v1"
          echo "  Health:   http://${{ secrets['SERVER_HOST'] }}:5000/api/v1/health"

      - name: Deployment failed
        if: failure()
        run: |
          echo "================================================================================"
          echo "DEPLOYMENT FAILED"
          echo "================================================================================"
          echo "Check the logs above. To roll back manually:"
          echo "  ssh ${{ secrets['SERVER_USER'] }}@${{ secrets['SERVER_HOST'] }}"
          echo "  cd /root/abc-dashboard"
          echo "  docker tag abc-license-backend:rollback abc-license-backend:latest"
          echo "  docker tag abc-license-frontend:rollback abc-license-frontend:latest"
          echo "  docker compose up -d"
          exit 1
