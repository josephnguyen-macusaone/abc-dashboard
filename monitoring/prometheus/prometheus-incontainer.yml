# Prometheus config when running inside the same container as the backend.
# Scrapes http://127.0.0.1:5000 (same container).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'abc-backend'
    metrics_path: /api/v1/metrics/prometheus
    static_configs:
      - targets: ['127.0.0.1:5000']
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
