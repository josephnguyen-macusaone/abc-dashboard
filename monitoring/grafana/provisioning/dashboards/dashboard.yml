# Load dashboards from the dashboards folder
apiVersion: 1
providers:
  - name: 'ABC Dashboard'
    orgId: 1
    folder: 'ABC Backend'
    folderUid: 'abc-backend'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
