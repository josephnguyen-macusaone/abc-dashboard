services:

  # Redis
  redis:
    image: redis:7-alpine
    container_name: abc-license-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel warning
    ports:
      # Override on crowded hosts via .env: REDIS_HOST_PORT=6382
      - "${REDIS_HOST_PORT:-6380}:6379"
    networks:
      - network
    volumes:
      - abc-license-redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL
  # POSTGRES_PASSWORD=enc:... requires decrypted POSTGRES_PASSWORD_PLAIN for this service.
  # enc: password: start with ./scripts/deploy.sh up -d (sets POSTGRES_PASSWORD_PLAIN).
  postgres:
    image: postgres:16-alpine
    container_name: abc-license-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PLAIN:-${POSTGRES_PASSWORD}}
    volumes:
      - abc-license-postgres_data:/var/lib/postgresql/data
    ports:
      # Override on crowded hosts via .env: POSTGRES_HOST_PORT=5436
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (all-in-one: Node + Prometheus + Grafana in one container)
  backend:
    image: abc-license-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: abc-license-backend
    restart: unless-stopped
    ports:
      - "5001:5000"   # API
      - "9090:9090"   # Prometheus (in-container)
      - "3030:3000"   # Grafana (in-container listens on 3000)
    deploy:
      resources:
        limits:
          memory: 768M  # Backend + Prometheus + Grafana
          cpus: '0.75'
        reservations:
          memory: 384M
    environment:
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - NODE_ENV=${NODE_ENV}
      - PORT=5000
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-abc_dashboard}
      - POSTGRES_USER=${POSTGRES_USER:-abc_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CLIENT_URL=${CLIENT_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - CACHE_TYPE=${CACHE_TYPE:-redis}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EXTERNAL_LICENSE_API_URL=${EXTERNAL_LICENSE_API_URL}
      - EXTERNAL_LICENSE_API_KEY=${EXTERNAL_LICENSE_API_KEY}
      - LICENSE_SYNC_SCHEDULE=${LICENSE_SYNC_SCHEDULE:-}
      - LICENSE_SYNC_ENABLED=${LICENSE_SYNC_ENABLED:-false}
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-false}
      - LOG_FORMAT=${LOG_FORMAT:-dev}
      - LOG_TO_FILE=${LOG_TO_FILE:-false}
    volumes:
      - abc-grafana_data:/var/lib/grafana
    networks:
      - network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend Next.js (host port 3001 if 3000 is in use)
  frontend:
    image: abc-license-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_USE_RELATIVE_API=${NEXT_PUBLIC_USE_RELATIVE_API:-true}
        - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
        - NEXT_PUBLIC_WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-false}
        - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
        - BUILDKIT_INLINE_CACHE=1
      # Uncomment when abc-license-frontend:latest exists (faster rebuilds); omit on first build / CI
      # cache_from:
      #   - abc-license-frontend:latest
      target: production
    container_name: abc-license-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    environment:
      - NODE_ENV=${NODE_ENV}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USE_RELATIVE_API=${NEXT_PUBLIC_USE_RELATIVE_API:-true}
      - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    networks:
      - network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  abc-license-postgres_data:
    driver: local
  abc-license-redis_data:
    driver: local
  abc-grafana_data:
    driver: local

networks:
  network:
    driver: bridge